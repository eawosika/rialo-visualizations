*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0a0a; min-height: 100vh; font-family: 'Roobert', system-ui, -apple-system, sans-serif; color: #f0eeea; }
body { padding: 0; }
#page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
#page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(169,221,211,0.12); }
.read-article { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(169,221,211,0.6); text-decoration: none; border: 1px solid rgba(169,221,211,0.2); border-radius: 6px; padding: 6px 12px; white-space: nowrap; margin-top: 4px; transition: color 0.15s, border-color 0.15s; }
.read-article:hover { color: #a9ddd3; border-color: rgba(169,221,211,0.45); }
.read-article svg { flex-shrink: 0; }
.action-row { display: flex; justify-content: flex-end; gap: 8px; padding-top: 10px; }
.action-btn { background: transparent; border: 1px solid rgba(169,221,211,0.3); color: #a9ddd3; font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Roobert', system-ui, sans-serif; opacity: 0.7; transition: opacity 0.15s; }
.action-btn:hover { opacity: 1; }

.share-wrap { position: relative; display: inline-block; }
.share-menu { display: none; position: absolute; bottom: calc(100% + 6px); right: 0; background: #141414; border: 1px solid rgba(169,221,211,0.25); border-radius: 8px; padding: 6px; min-width: 180px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
.share-menu.open { display: block; }
.share-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 5px; font-size: 11px; color: rgba(240,238,234,0.7); cursor: pointer; text-decoration: none; white-space: nowrap; background: none; border: none; font-family: 'Roobert', system-ui, sans-serif; width: 100%; }
.share-item:hover { background: rgba(169,221,211,0.08); color: #f0eeea; }
.share-item svg { flex-shrink: 0; opacity: 0.6; }
.share-item:hover svg { opacity: 1; }
.share-divider { height: 1px; background: rgba(169,221,211,0.1); margin: 4px 0; }


body{margin:0;background:#0a0a0a}
{box-sizing:border-box}
{background:#0a0a0a;width:100%;padding:1rem;font-family:'Roobert',system-ui,-apple-system,sans-serif;color:#f0eeea}
.toprow{margin-bottom:10px}
.ey{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#a9ddd3;margin:0 0 3px;display:block}
.hl{font-size:14px;font-weight:500;color:#f0eeea;margin:0 0 5px;display:block}
.cta{font-size:12px;color:rgba(169,221,211,0.6);display:flex;align-items:center;gap:5px;margin-top:8px}
.mapwrap{position:relative;background:#0a0a0a;border:1px solid rgba(169,221,211,0.12);border-radius:10px;overflow:hidden}
svg.wmap{width:100%;display:block}
.ocean{fill:#0a0a0a}
.land{fill:rgba(169,221,211,0.08);stroke:rgba(169,221,211,0.16);stroke-width:0.35;stroke-linejoin:round}
.grat{fill:none;stroke:rgba(169,221,211,0.05);stroke-width:0.35}
.eqlabel{font-size:6px;fill:rgba(169,221,211,0.2);letter-spacing:.07em;pointer-events:none}
.cpath{fill:rgba(169,221,211,0.22);stroke:#a9ddd3;stroke-width:0.8;stroke-linejoin:round;cursor:pointer}
.cpath:hover{fill:rgba(169,221,211,0.38)}
.cpath.act{fill:rgba(169,221,211,0.42);stroke:#fff;stroke-width:1}
.fpin{cursor:pointer}
.overlay{display:none;position:absolute;top:10px;right:10px;width:330px;max-height:calc(100% - 20px);overflow-y:auto;background:#0f0f0f;border:1px solid rgba(169,221,211,0.25);border-radius:10px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,0.8)}
.overlay.vis{display:block}
.ovc{position:absolute;top:9px;right:10px;background:none;border:none;color:rgba(240,238,234,0.35);font-size:17px;cursor:pointer;padding:0;line-height:1;font-family:system-ui}
.ovc:hover{color:#f0eeea}
.ovh{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid rgba(169,221,211,0.12)}
.cn{font-size:13px;font-weight:500;color:#f0eeea}
.cs{font-size:10px;color:rgba(240,238,234,0.42);line-height:1.3;margin-top:1px}
.hero{background:#181818;border-radius:6px;padding:9px 11px;margin-bottom:8px}
.hl2{font-size:10.5px;font-weight:500;color:rgba(240,238,234,0.75);margin-bottom:4px;display:block}
.hv{font-size:20px;font-weight:500;color:#a9ddd3;line-height:1.1}
.sec{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:#a9ddd3;margin:8px 0 3px;display:block}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(169,221,211,0.07);font-size:10.5px;gap:6px}
.row:last-child{border-bottom:none}
.rl{color:rgba(240,238,234,0.4);flex-shrink:0}
.rv{font-weight:500;color:#f0eeea;text-align:right}
.note{margin-top:8px;padding:7px 9px;border-radius:5px;background:rgba(169,221,211,0.05);border:1px solid rgba(169,221,211,0.12);font-size:9.5px;line-height:1.5;color:rgba(169,221,211,0.7)}
.sources{margin-top:10px;padding-top:8px;border-top:1px solid rgba(169,221,211,0.1)}
.src-title{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(169,221,211,0.55);margin:0 0 4px;display:block}
.src-item{font-size:9px;color:rgba(240,238,234,0.38);line-height:1.6;display:flex;align-items:baseline;gap:4px}
.src-item a{color:rgba(169,221,211,0.45);text-decoration:none;flex-shrink:0;font-size:9px;line-height:1}
.src-item a:hover{color:#a9ddd3}
sup{font-size:8px;color:#a9ddd3;vertical-align:super;line-height:0}
#sg-wrap sup{font-size:7px;color:#a9ddd3;vertical-align:super;line-height:0}


@media (max-width: 600px) {
  /* ── Layout ── */
  #page { padding: 0.75rem; }
  #page-header { flex-direction: column; gap: 8px; align-items: flex-start; }
  .toprow { margin-bottom: 6px; }
  .hl { font-size: 13px; }
  .cta { font-size: 10px; margin-top: 5px; }
  .action-row { gap: 6px; padding-top: 8px; }
  .action-btn { font-size: 10px; padding: 4px 9px; }
  .read-article { font-size: 10px; padding: 4px 9px; }
  .share-menu { min-width: 160px; right: 0; }
  .share-item { font-size: 10px; }

  /* ── Map: bigger on mobile so countries are tappable ── */
  svg.wmap { max-height: 380px; }
  .mapwrap { border-radius: 8px; }

  /* ── Overlay: scrollable bottom sheet on mobile ── */
  .overlay {
    position: fixed !important;
    top: auto !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    max-height: 60vh !important;
    border-radius: 16px 16px 0 0 !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
    padding: 18px 18px 32px 18px !important;
    box-sizing: border-box !important;
    z-index: 999 !important;
  }

  /* ── Fact sheet: compact ── */
  .ovh { gap: 7px; margin-bottom: 7px; padding-bottom: 7px; }
  .cn { font-size: 11px; }
  .cs { font-size: 8.5px; }
  .hero { padding: 7px 9px; margin-bottom: 6px; }
  .hv { font-size: 17px; }
  .hl2 { font-size: 9px; }
  .sec { font-size: 7.5px; margin: 5px 0 2px; }
  .row { font-size: 9.5px; padding: 2px 0; }
  .note { font-size: 8.5px; padding: 5px 7px; margin-top: 6px; }
  .src-title { font-size: 7.5px; }
  .src-item { font-size: 8px; }
  .ovc { font-size: 20px; top: 8px; right: 10px; }
  .sources { margin-top: 7px; padding-top: 6px; }
}
</style>

// Build static grid with full fact sheets and global source numbering
var G7 = ['ca','us','uk','de'];
var BRICS = ['br','cn','in','za'];
var rowLabels = {g7:'G7', brics:'BRICS'};

function buildGrid(){
  // Build global source list in order: G7 then BRICS, preserving per-country source order
  var globalSources = []; // [{num, label, url, countryId, localNum}]
  var globalNum = 1;
  // map: countryId -> {localNum -> globalNum}
  var numMap = {};
  [G7, BRICS].forEach(function(group){
    group.forEach(function(id){
      var d = D[id];
      numMap[id] = {};
      d.sources.forEach(function(s){
        numMap[id][s[0]] = globalNum;
        globalSources.push({num: globalNum, label: s[1], url: s[2]});
        globalNum++;
      });
    });
  });

  // Helper: remap local superscripts in a string to global numbers for a given country
  function remap(str, id){
    return str.replace(/<sup>(\d+)<\/sup>/g, function(_, n){
      var g = numMap[id][n];
      return g ? '<sup>'+g+'</sup>' : '';
    });
  }

  var html = '';
  [['g7',G7],['brics',BRICS]].forEach(function(group){
    var key = group[0], ids = group[1];
    html += '<div class="sg-row-label">'+rowLabels[key]+'</div>';
    html += '<div class="sg-row">';
    ids.forEach(function(id){
      var d = D[id];
      html += '<div class="sg-card">';
      // header
      html += '<div class="sg-head"><svg width="28" height="18" viewBox="0 0 38 24" style="border-radius:2px;border:1px solid rgba(255,255,255,0.1);flex-shrink:0">'+d.flag+'</svg>';
      html += '<div><div class="sg-name">'+d.name+'</div><div class="sg-sub">'+d.sub+'</div></div></div>';
      // hero
      html += '<div class="sg-hv">'+d.hv+'<sup>'+numMap[id]['1']+'</sup></div>';
      html += '<div class="sg-hl">'+d.hl+'</div>';
      // all rows with remapped superscripts
      html += '<div class="sg-rows">';
      d.rows.forEach(function(r){
        html += '<div class="sg-r"><span class="sg-rl">'+r[0]+'</span><span class="sg-rv">'+remap(r[1], id)+'</span></div>';
      });
      html += '</div>';
      // note
      html += '<div class="sg-note">'+d.note+'</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  // unified source list
  html += '<div class="sg-sources"><span class="sg-src-title">Sources</span>';
  globalSources.forEach(function(s){
    html += '<span class="sg-src-item"><sup>'+s.num+'.</sup> '+s.label+'</span>';
  });
  html += '</div>';

  document.getElementById('sg-inner').innerHTML = html;
}
document.addEventListener('DOMContentLoaded', function(){
  buildGrid();

        wrap.style.position = 'fixed';
        wrap.style.top = '-9999px';
        wrap.style.left = '-9999px';
        wrap.style.zIndex = '';

}); // DOMContentLoaded

var PAGE_DESC = 'How consumer credit markets compare around the world: household debt, credit growth, scoring models, and regulators across eight major economies.';

document.getElementById('sg-share').addEventListener('click', function(e){
  e.stopPropagation();
  document.getElementById('share-menu').classList.toggle('open');
});
document.addEventListener('click', function(){
  document.getElementById('share-menu').classList.remove('open');
});
document.getElementById('share-menu').addEventListener('click', function(e){ e.stopPropagation(); });

document.getElementById('share-linkedin').href =
  'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(PAGE_URL);
document.getElementById('share-x').href =
  'https://twitter.com/intent/tweet?url=' + encodeURIComponent(PAGE_URL) + '&text=' + encodeURIComponent(PAGE_TITLE);
document.getElementById('share-reddit').href =
  'https://www.reddit.com/submit?url=' + encodeURIComponent(PAGE_URL) + '&title=' + encodeURIComponent(PAGE_TITLE);
document.getElementById('share-email').href =
  'mailto:?subject=' + encodeURIComponent(PAGE_TITLE) + '&body=' + encodeURIComponent(PAGE_DESC + '\n\n' + PAGE_URL);
document.getElementById('share-copy').addEventListener('click', function(){
  if(navigator.clipboard){
    navigator.clipboard.writeText(PAGE_URL).then(function(){
      var lbl = document.getElementById('copy-label');
      lbl.textContent = 'Copied';
      setTimeout(function(){ lbl.textContent = 'Copy link'; }, 2000);
    });
  }
});
</script>

<script>

  var h = document.body.scrollHeight;
  if(window.parent !== window){
    window.parent.postMessage({type:'viz-height', height: h}, '*');
  }
}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);
// Also report after grid builds and overlays open
var _origBuildGrid = typeof buildGrid === 'function' ? buildGrid : null;
setTimeout(reportHeight, 500);
</script>

<script>
function reportHeight() {
  var height = document.body.scrollHeight;

}
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);

if (document.readyState === 'complete') { setTimeout(reportHeight, 300); }

<script>
(function(){
  var btn = document.getElementById('read-article-btn');
  var ARTICLE_URL = 'https://www.rialo.io/posts/upgrading-the-lending-stack';
  var STANDALONE_URL = 'https://eawosika.github.io/rialo-visualizations/world-credit-market-map.html';
  if (window.self !== window.top) {
    // Inside iframe — point to standalone
    btn.href = STANDALONE_URL;
    btn.target = '_blank';
    btn.querySelector ? btn.childNodes[0].textContent = 'Open in full view' : null;
    // Set text node (first child is the text)
    btn.firstChild.nodeValue = 'Open in full view';
  } else {
    // Standalone — point to article
    btn.href = ARTICLE_URL;
    btn.target = '_blank';
    btn.firstChild.nodeValue = 'Read the article';
  }
})();
</script>
